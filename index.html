<!DOCTYPE html>
<html>
<head>
    <title>Birthday Toggle</title>
    <script>
        let audio = new Audio('birthday.mp3');
        function togglePlayPause() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>
</head>
<body>
    <button onclick="togglePlayPause()">Play/Pause Birthday Song</button>
</body>
</html>
