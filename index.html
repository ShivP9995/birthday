<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card</title>
    <style>
        body {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            text-align: center;
            color: white;
            font-family: 'Arial', sans-serif;
            animation: hearts 1s ease infinite;
        }
        h1 { font-size: 3em; }
        #cake { width: 300px; }
        button {
            padding: 10px 20px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        @keyframes hearts {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <h1>Happy Birthday!</h1>
    <img id="cake" src="cake.gif" alt="Birthday Cake">
    <audio controls>
        <source src="https://raw.githubusercontent.com/ShivP9995/birthday/main/birthday.mp3" type="audio/mpeg">
    </audio>
    <button>Celebrate!</button>
</body>
</html>
